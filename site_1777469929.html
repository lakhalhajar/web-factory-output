<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architectural Systems | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zinc: { 950: '#09090b', 900: '#18181b', 800: '#27272a' },
                        emerald: { 500: '#10b981' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(24, 24, 27, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(63, 63, 70, 0.4); }
        .bento-card { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .bento-card:hover { border-color: rgba(16, 185, 129, 0.5); box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased selection:bg-emerald-500/30">

    <!-- Status Bar -->
    <div class="fixed top-0 w-full z-50 glass border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-6 py-2 flex justify-between items-center text-[10px] uppercase tracking-widest text-zinc-400">
            <span>System: Operational</span>
            <span id="site-tag-display"></span>
        </div>
    </div>

    <main x-data="architectApp()" class="pt-24 pb-20 px-6 max-w-7xl mx-auto">
        
        <!-- Hero Section -->
        <header class="mb-16">
            <h1 class="text-6xl font-bold tracking-tighter mb-4">Structural <span class="text-emerald-500">Integrity</span></h1>
            <p class="text-zinc-400 max-w-xl text-lg">Precision-engineered digital environments. High-fidelity architectural visualization and system design.</p>
        </header>

        <!-- Dynamic Bento Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4" x-show="!loading">
            
            <!-- Empty State -->
            <template x-if="tasks.length === 0">
                <div class="col-span-full py-20 flex flex-col items-center justify-center border border-dashed border-zinc-800 rounded-3xl">
                    <div class="w-16 h-16 bg-zinc-900 border-2 border-emerald-500/30 rotate-45 mb-6"></div>
                    <p class="text-zinc-500 font-medium">Awaiting structural data input...</p>
                </div>
            </template>

            <!-- Data Cards -->
            <template x-for="task in tasks" :key="task.id">
                <div class="bento-card glass rounded-3xl p-8 flex flex-col justify-end group overflow-hidden relative" 
                     :class="task.span ? 'md:col-span-2' : 'md:col-span-1'">
                    <div class="absolute inset-0 bg-gradient-to-br from-emerald-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <span class="text-emerald-500 text-xs font-mono mb-2" x-text="task.category || 'PROJECT'"></span>
                    <h3 class="text-2xl font-semibold mb-2" x-text="task.title"></h3>
                    <p class="text-zinc-400 text-sm" x-text="task.description"></p>
                </div>
            </template>
        </div>

        <!-- Loading State -->
        <div x-show="loading" class="flex justify-center py-20">
            <div class="w-8 h-8 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
    </main>

    <footer class="text-center py-10 border-t border-zinc-900 text-zinc-600 text-sm">
        &copy; <span x-text="new Date().getFullYear()"></span> Architectural Systems. All rights reserved.
    </footer>

    <script>
        const API_BASE = 'https://bazz44-93vu3cg8t-lakhalhajar75-3482s-projects.vercel.app';
        const site_tag = 'architect';

        function architectApp() {
            return {
                tasks: [],
                loading: true,
                
                async init() {
                    document.getElementById('site-tag-display').innerText = site_tag;
                    try {
                        // STRICT SYNC PROTOCOL: FETCH PATH
                        const response = await fetch(`https://bazz44-93vu3cg8t-lakhalhajar75-3482s-projects.vercel.app/api/projects`, {
        method: 'GET',
        mode: 'cors',
        headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json'
        }
    });
                        if (!response.ok) throw new Error('Network response failure');
                        this.tasks = await response.json();
                    } catch (error) {
                        console.error('System Error:', error);
                        // Fallback/Mock data for demonstration if backend is unreachable
                        this.tasks = [
                            { id: 1, title: 'Modernist Villa', description: 'Zero-emission glass structure.', category: 'RESIDENTIAL', span: true },
                            { id: 2, title: 'Urban Grid', description: 'Optimized city planning.', category: 'INFRASTRUCTURE', span: false },
                            { id: 3, title: 'Skyline Tower', description: 'Vertical density analysis.', category: 'COMMERCIAL', span: false },
                            { id: 4, title: 'Green Oasis', description: 'Biophilic design integration.', category: 'LANDSCAPE', span: true }
                        ];
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
