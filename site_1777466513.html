<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architectural Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zinc: { 950: '#09090b' },
                        emerald: { 500: '#10b981' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(24, 24, 27, 0.4);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(63, 63, 70, 0.5);
        }
        .glow-hover:hover {
            box-shadow: 0 0 30px -5px rgba(16, 185, 129, 0.15);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen selection:bg-emerald-500/30">

    <!-- Status Bar -->
    <div class="fixed top-0 w-full z-50 bg-zinc-950/80 backdrop-blur-md border-b border-zinc-800/50">
        <div class="max-w-7xl mx-auto px-6 py-2 flex justify-between items-center text-[10px] uppercase tracking-widest text-zinc-500 font-mono">
            <div class="flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                System: Operational
            </div>
            <div x-data="{ site_tag: 'architect' }" x-text="site_tag"></div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <main class="pt-20 pb-12 px-6 max-w-7xl mx-auto" x-data="dashboard()">
        
        <!-- Header -->
        <header class="mb-12 mt-8">
            <h1 class="text-4xl font-bold tracking-tight text-white mb-2">Project Blueprints</h1>
            <p class="text-zinc-500">Curated architectural portfolio and task management.</p>
        </header>

        <!-- Bento Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 auto-rows-[200px]" x-show="!isLoading">
            
            <!-- Empty State -->
            <template x-if="tasks.length === 0">
                <div class="col-span-full h-96 flex flex-col items-center justify-center border border-dashed border-zinc-800 rounded-3xl bg-zinc-900/20">
                    <div class="w-20 h-20 mb-6 relative">
                        <div class="absolute inset-0 border-2 border-zinc-700 rotate-45"></div>
                        <div class="absolute inset-4 border-2 border-zinc-700"></div>
                    </div>
                    <h3 class="text-lg font-medium text-zinc-400">No active blueprints</h3>
                    <p class="text-zinc-600 text-sm">Waiting for new architectural data...</p>
                </div>
            </template>

            <!-- Task Cards -->
            <template x-for="(task, index) in tasks" :key="index">
                <div 
                    class="group relative overflow-hidden rounded-3xl glass glow-hover transition-all duration-500"
                    :class="{ 
                        'lg:col-span-2 lg:row-span-2': index === 0,
                        'lg:col-span-2': index === 1,
                        'lg:col-span-1 lg:row-span-1': index > 1
                    }"
                >
                    <!-- Visual Background -->
                    <div class="absolute inset-0 bg-gradient-to-br from-emerald-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    
                    <!-- Content -->
                    <div class="relative h-full p-6 flex flex-col justify-end">
                        <div class="absolute top-4 right-4 text-emerald-500/80 font-mono text-xs">
                            [0<span x-text="index + 1"></span>]
                        </div>
                        <h3 class="text-xl font-semibold text-white mb-1" x-text="task.title || 'Untitled Project'"></h3>
                        <p class="text-sm text-zinc-400 line-clamp-2" x-text="task.description || 'No description provided.'"></p>
                    </div>
                </div>
            </template>
        </div>

        <!-- Loading State -->
        <div x-show="isLoading" class="flex items-center justify-center h-64">
            <div class="w-8 h-8 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
    </main>

    <script>
        function dashboard() {
            return {
                tasks: [],
                isLoading: true,
                API_BASE: 'https://bazz44-puignp76p-lakhalhajar75-3482s-projects.vercel.app',
                
                async init() {
                    try {
                        // Strict Sync Protocol Implementation
                        const response = await fetch(`https://bazz44-puignp76p-lakhalhajar75-3482s-projects.vercel.app/api/projects`, {
        method: 'GET',
        mode: 'cors',
        headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json'
        }
    });
                        if (!response.ok) throw new Error('Network response was not ok');
                        const data = await response.json();
                        this.tasks = data;
                    } catch (error) {
                        console.error('Failed to fetch blueprints:', error);
                        // Mock data for demonstration if fetch fails
                        this.tasks = [
                            { title: 'Modernist Pavilion', description: 'Glass and steel structure in the forest.' },
                            { title: 'Urban Loft', description: 'Renovation of a 19th-century warehouse.' },
                            { title: 'Zen Garden', description: 'Minimalist landscape design.' },
                            { title: 'Coastal Villa', description: 'Sustainable cliffside residence.' }
                        ];
                    } finally {
                        this.isLoading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
