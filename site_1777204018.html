<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 glass hidden md:flex flex-col p-6">
            <div class="flex items-center gap-2 mb-10">
                <i data-lucide="building-2" class="text-indigo-400"></i>
                <h1 class="text-xl font-bold text-white">ArchDash</h1>
            </div>
            <nav class="space-y-4">
                <a href="#" class="flex items-center gap-3 text-indigo-400 font-medium">
                    <i data-lucide="layout-dashboard" size="20"></i> Dashboard
                </a>
                <a href="#" class="flex items-center gap-3 text-slate-400 hover:text-white transition">
                    <i data-lucide="settings" size="20"></i> Settings
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-8">
            <header class="mb-8">
                <h2 class="text-3xl font-bold text-white">Project Overview</h2>
                <p class="text-slate-400">Manage your architectural assets and project data.</p>
            </header>

            <!-- Input Form -->
            <section class="glass rounded-2xl p-6 mb-8">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="plus-circle" size="20"></i> Add New Project
                </h3>
                <form id="projectForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="name" placeholder="Project Name" class="bg-slate-900/50 border border-slate-700 rounded-lg p-3 outline-none focus:border-indigo-500" required>
                    <input type="text" id="description" placeholder="Description" class="bg-slate-900/50 border border-slate-700 rounded-lg p-3 outline-none focus:border-indigo-500" required>
                    <input type="url" id="image_url" placeholder="Image URL" class="bg-slate-900/50 border border-slate-700 rounded-lg p-3 outline-none focus:border-indigo-500" required>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg transition col-span-1 md:col-span-3">
                        Save Project
                    </button>
                </form>
            </section>

            <!-- Data Table -->
            <section class="glass rounded-2xl p-6">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="database" size="20"></i> Current Projects
                </h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-white/10 text-slate-400">
                                <th class="pb-4">Name</th>
                                <th class="pb-4">Description</th>
                                <th class="pb-4">Image Preview</th>
                            </tr>
                        </thead>
                        <tbody id="projectTableBody">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Protocol Constants
        const API_BASE = 'https://bazz44-bkplrnrf7-lakhalhajar75-3482s-projects.vercel.app/api';
        const SITE_TAG = 'architect_dashboard';

        // Initialize Icons
        lucide.createIcons();

        // Fetch Data
        async function fetchProjects() {
            try {
                const response = await fetch(`${API_BASE}/api/projects?site_tag=${SITE_TAG}`);
                const data = await response.json();
                const tbody = document.getElementById('projectTableBody');
                tbody.innerHTML = '';
                
                data.forEach(item => {
                    const row = `
                        <tr class="border-b border-white/5 hover:bg-white/5 transition">
                            <td class="py-4 font-medium">${item.name}</td>
                            <td class="py-4 text-slate-400">${item.description}</td>
                            <td class="py-4">
                                <img src="${item.image_url}" alt="${item.name}" class="w-12 h-12 rounded-lg object-cover">
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (err) {
                console.error("Error fetching data:", err);
            }
        }

        // Handle Submission
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                image_url: document.getElementById('image_url').value,
                site_tag: SITE_TAG
            };

            try {
                await fetch(`${API_BASE}/api/projects`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                e.target.reset();
                fetchProjects();
            } catch (err) {
                console.error("Error saving data:", err);
            }
        });

        // Initial Load
        fetchProjects();
    </script>
</body>
</html>
