<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8">

    <div x-data="{ 
        projects: [], 
        form: { name: '', description: '', image_url: '' }, 
        loading: false,
        API_BASE: 'https://bazz44-api.vercel.app',
        site_tag: 'architect',
        
        async fetchProjects() {
            this.loading = true;
            try {
                const response = await fetch(`${this.API_BASE}/api/projects?site_tag=${this.site_tag}`);
                this.projects = await response.json();
            } catch (error) {
                console.error('Error fetching projects:', error);
            } finally {
                this.loading = false;
            }
        },

        async addProject() {
            this.loading = true;
            try {
                await fetch(`${this.API_BASE}/api/projects`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        ...this.form, 
                        site_tag: this.site_tag 
                    })
                });
                this.form = { name: '', description: '', image_url: '' };
                await this.fetchProjects();
            } catch (error) {
                console.error('Error adding project:', error);
            } finally {
                this.loading = false;
            }
        }
    }" x-init="fetchProjects()" class="max-w-6xl mx-auto">

        <!-- Header -->
        <header class="mb-12">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300">Architect Dashboard</h1>
            <p class="text-slate-400 mt-2">Manage your structural projects with precision.</p>
        </header>

        <!-- Form Section -->
        <section class="glass rounded-2xl p-6 mb-12">
            <h2 class="text-xl font-semibold mb-6">New Project Entry</h2>
            <form @submit.prevent="addProject" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" x-model="form.name" placeholder="Project Name" required class="bg-slate-900/50 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-blue-500">
                <input type="text" x-model="form.image_url" placeholder="Image URL" required class="bg-slate-900/50 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-blue-500">
                <textarea x-model="form.description" placeholder="Project Description" required class="md:col-span-2 bg-slate-900/50 border border-slate-700 rounded-lg p-3 h-24 focus:outline-none focus:border-blue-500"></textarea>
                <button type="submit" :disabled="loading" class="md:col-span-2 bg-blue-600 hover:bg-blue-500 transition-colors py-3 rounded-lg font-bold disabled:opacity-50">
                    <span x-text="loading ? 'Processing...' : 'Deploy Project'"></span>
                </button>
            </form>
        </section>

        <!-- Grid Section -->
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="project in projects" :key="project.id">
                <div class="glass rounded-2xl overflow-hidden hover:scale-[1.02] transition-transform">
                    <img :src="project.image_url" :alt="project.name" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <h3 class="text-xl font-bold mb-2" x-text="project.name"></h3>
                        <p class="text-slate-400 text-sm leading-relaxed" x-text="project.description"></p>
                    </div>
                </div>
            </template>
        </section>

    </div>
</body>
</html>
