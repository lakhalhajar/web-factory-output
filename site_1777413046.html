<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased min-h-screen">

    <div x-data="{
        tasks: [],
        loading: true,
        site_tag: 'architect',
        async init() {
            const API_BASE = 'https://bazz44-api.vercel.app';
            try {
                const response = await fetch(`${API_BASE}/api/projects`);
                if (!response.ok) throw new Error('Network response was not ok');
                this.tasks = await response.json();
            } catch (error) {
                console.error('Error fetching data:', error);
                // Fallback for demonstration if API is unreachable
                this.tasks = [
                    { name: 'System Architecture', description: 'Core infrastructure design and scaling protocols.', image_url: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=600' },
                    { name: 'Frontend Refactor', description: 'Migrating legacy components to Alpine.js.', image_url: 'https://images.unsplash.com/photo-1633356122544-f134324a6cee?q=80&w=600' }
                ];
            } finally {
                this.loading = false;
            }
        }
    }" class="max-w-7xl mx-auto px-6 py-12">

        <!-- Header -->
        <header class="mb-12 flex justify-between items-end border-b border-zinc-800 pb-6">
            <div>
                <h1 class="text-4xl font-bold tracking-tight text-white">Dashboard</h1>
                <p class="text-zinc-500 mt-2">Managing project architecture and deployment pipelines.</p>
            </div>
            <div class="px-4 py-1 rounded-full bg-zinc-900 border border-zinc-800 text-xs font-mono text-zinc-400 uppercase tracking-widest">
                Tag: <span x-text="site_tag"></span>
            </div>
        </header>

        <!-- Loading State -->
        <div x-show="loading" class="flex justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-zinc-500"></div>
        </div>

        <!-- Grid -->
        <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" x-cloak>
            <template x-for="task in tasks" :key="task.name">
                <div class="group bg-zinc-900/50 backdrop-blur-md border border-zinc-800 rounded-2xl p-5 hover:border-zinc-600 transition-all duration-300 shadow-xl">
                    <div class="relative overflow-hidden rounded-xl mb-4">
                        <img :src="task.image_url" alt="Task Image" class="w-full h-48 object-cover transform group-hover:scale-105 transition-transform duration-500">
                        <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 to-transparent opacity-60"></div>
                    </div>
                    <h3 class="text-xl font-semibold text-zinc-100 mb-2" x-text="task.name"></h3>
                    <p class="text-zinc-400 text-sm leading-relaxed" x-text="task.description"></p>
                    <div class="mt-6 flex justify-end">
                        <button class="text-xs font-medium text-zinc-300 hover:text-white transition px-3 py-1.5 rounded-lg border border-zinc-700 hover:bg-zinc-800">
                            View Details
                        </button>
                    </div>
                </div>
            </template>
        </div>

        <!-- Empty State -->
        <div x-show="!loading && tasks.length === 0" class="text-center py-20 text-zinc-600" x-cloak>
            No tasks found in the current architecture.
        </div>

    </div>
</body>
</html>
