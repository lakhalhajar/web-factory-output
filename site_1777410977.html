<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans antialiased selection:bg-indigo-500/30">

    <div x-data="dashboardController()" class="max-w-7xl mx-auto px-6 py-12">
        <!-- Header -->
        <header class="mb-12 border-b border-white/5 pb-8">
            <div class="flex items-center gap-3">
                <div class="w-2 h-8 bg-indigo-500 rounded-full"></div>
                <h1 class="text-4xl font-bold tracking-tighter" x-text="site_tag.charAt(0).toUpperCase() + site_tag.slice(1)"></h1>
            </div>
            <p class="text-zinc-500 mt-2 text-lg">Professional Project Overview</p>
        </header>

        <!-- Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <template x-for="task in tasks" :key="task.id">
                <div class="group bg-zinc-900/50 border border-white/5 backdrop-blur-xl rounded-3xl overflow-hidden hover:border-white/10 transition-all duration-300">
                    <!-- Image -->
                    <div class="aspect-video overflow-hidden">
                        <img :src="task.image_url" :alt="task.name" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                    </div>
                    
                    <!-- Content -->
                    <div class="p-6">
                        <h2 class="text-xl font-semibold text-white mb-2" x-text="task.name"></h2>
                        <p class="text-zinc-400 text-sm leading-relaxed" x-text="task.description"></p>
                    </div>
                </div>
            </template>
        </div>

        <!-- Empty State -->
        <div x-show="tasks.length === 0" class="text-center py-20">
            <p class="text-zinc-600">Loading project data...</p>
        </div>
    </div>

    <script>
        const API_BASE = 'https://bazz44-api.vercel.app';
        const site_tag = 'architect';

        function dashboardController() {
            return {
                tasks: [],
                init() {
                    this.fetchData();
                },
                async fetchData() {
                    try {
                        const response = await fetch(`${API_BASE}/api/projects`);
                        if (!response.ok) throw new Error('Network response error');
                        this.tasks = await response.json();
                    } catch (error) {
                        console.error('Failed to sync data:', error);
                        // Mock data for visual demonstration if API is unavailable
                        this.tasks = [
                            { id: 1, name: 'Glass Structure', description: 'Modern minimalist facade design.', image_url: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=800' },
                            { id: 2, name: 'Urban Loft', description: 'Industrial renovation project.', image_url: 'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?q=80&w=800' },
                            { id: 3, name: 'Zen Garden', description: 'Landscape integration.', image_url: 'https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=800' }
                        ];
                    }
                }
            }
        }
    </script>
</body>
</html>
