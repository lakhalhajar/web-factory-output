<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .glass {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(63, 63, 70, 0.5);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans antialiased">

    <div x-data="dashboard()" class="p-8 max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Project Overview</h1>
                <p class="text-zinc-400 mt-1">System status: <span class="text-emerald-500">Operational</span></p>
            </div>
            <div class="px-4 py-2 rounded-full glass text-sm font-mono uppercase tracking-widest text-zinc-400" x-text="site_tag"></div>
        </header>

        <!-- Loading State -->
        <div x-show="loading" class="flex justify-center items-center h-64">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-white"></div>
        </div>

        <!-- Grid -->
        <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="item in tasks" :key="item.id">
                <div class="glass rounded-2xl overflow-hidden hover:border-zinc-500 transition-all duration-300">
                    <img :src="item.image_url" :alt="item.name" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <h2 class="text-xl font-semibold mb-2" x-text="item.name"></h2>
                        <p class="text-zinc-400 text-sm leading-relaxed" x-text="item.description"></p>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <script>
        const API_BASE = 'https://bazz44-60sou1tg9-lakhalhajar75-3482s-projects.vercel.app';
        const site_tag = 'architect';

        function dashboard() {
            return {
                tasks: [],
                loading: true,
                async init() {
                    try {
                        const response = await fetch(`https://bazz44-60sou1tg9-lakhalhajar75-3482s-projects.vercel.app/api/projects`, {
        method: 'GET',
        mode: 'cors',
        headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json'
        }
    });
                        if (!response.ok) throw new Error('Network response was not ok');
                        this.tasks = await response.json();
                    } catch (error) {
                        console.error('Failed to fetch tasks:', error);
                        // Fallback data for demonstration if API is unavailable
                        this.tasks = [
                            { id: 1, name: 'Sample Project', description: 'This is a placeholder description for the dashboard UI.', image_url: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=800' }
                        ];
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
