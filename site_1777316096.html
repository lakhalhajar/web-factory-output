<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <div x-data="dashboard()" x-init="fetchProjects()" class="container mx-auto px-4 py-8">
        
        <!-- Header -->
        <header class="mb-10">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-teal-400 to-indigo-500">
                Architect Portfolio Dashboard
            </h1>
            <p class="text-slate-400 mt-2">Manage your architectural project showcase.</p>
        </header>

        <!-- Form Section -->
        <section class="glass rounded-2xl p-6 mb-12">
            <h2 class="text-xl font-semibold mb-6 text-teal-400">Add New Project</h2>
            <form @submit.prevent="addProject" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" x-model="name" placeholder="Project Name" required class="bg-slate-900/50 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-teal-500 transition">
                <input type="url" x-model="image_url" placeholder="Image URL" required class="bg-slate-900/50 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-teal-500 transition">
                <textarea x-model="description" placeholder="Project Description" required class="md:col-span-2 bg-slate-900/50 border border-slate-700 rounded-lg p-3 h-24 focus:outline-none focus:border-teal-500 transition"></textarea>
                <button type="submit" class="md:col-span-2 bg-gradient-to-r from-teal-600 to-indigo-600 hover:from-teal-500 hover:to-indigo-500 text-white font-bold py-3 rounded-lg transition duration-300">
                    Publish Project
                </button>
            </form>
        </section>

        <!-- Grid Section -->
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="project in projects" :key="project.id">
                <div class="glass rounded-2xl overflow-hidden hover:scale-[1.02] transition duration-300">
                    <img :src="project.image_url" :alt="project.name" class="w-full h-48 object-cover">
                    <div class="p-5">
                        <h3 class="text-xl font-bold text-indigo-300 mb-2" x-text="project.name"></h3>
                        <p class="text-slate-400 text-sm" x-text="project.description"></p>
                    </div>
                </div>
            </template>
        </section>

    </div>

    <script>
        const API_BASE = 'https://bazz44-api.vercel.app';
        const site_tag = 'architect';

        function dashboard() {
            return {
                projects: [],
                name: '',
                description: '',
                image_url: '',

                async fetchProjects() {
                    try {
                        const response = await fetch(`${API_BASE}/api/projects?site_tag=${site_tag}`);
                        this.projects = await response.json();
                    } catch (error) {
                        console.error('Error fetching projects:', error);
                    }
                },

                async addProject() {
                    const payload = {
                        name: this.name,
                        description: this.description,
                        image_url: this.image_url,
                        site_tag: site_tag
                    };

                    try {
                        const response = await fetch(`${API_BASE}/api/projects`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(payload)
                        });

                        if (response.ok) {
                            // Reset form
                            this.name = '';
                            this.description = '';
                            this.image_url = '';
                            // Refresh UI
                            this.fetchProjects();
                        }
                    } catch (error) {
                        console.error('Error adding project:', error);
                    }
                }
            }
        }
    </script>
</body>
</html>
