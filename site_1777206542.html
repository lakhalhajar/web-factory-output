<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">

    <div x-data="dashboard()" x-init="fetchProjects()" class="max-w-7xl mx-auto">
        <header class="mb-10">
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Architect Dashboard</h1>
            <p class="text-slate-400">Manage your architectural portfolio</p>
        </header>

        <!-- Form Section -->
        <section class="bg-white/5 backdrop-blur-lg border border-white/10 p-6 rounded-2xl mb-10 shadow-2xl">
            <h2 class="text-xl font-semibold mb-4">Add New Project</h2>
            <form @submit.prevent="addProject()" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input x-model="newProject.name" type="text" placeholder="Project Name" class="bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:ring-2 ring-blue-500" required>
                <input x-model="newProject.description" type="text" placeholder="Description" class="bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:ring-2 ring-blue-500" required>
                <input x-model="newProject.image_url" type="url" placeholder="Image URL" class="bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:ring-2 ring-blue-500" required>
                <button type="submit" class="bg-blue-600 hover:bg-blue-500 transition-colors rounded-lg font-bold">Add Project</button>
            </form>
        </section>

        <!-- Grid Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="project in projects" :key="project.id">
                <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl overflow-hidden hover:border-blue-500/50 transition-all shadow-xl">
                    <img :src="project.image_url" :alt="project.name" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <h3 class="text-xl font-bold mb-2" x-text="project.name"></h3>
                        <p class="text-slate-400 text-sm" x-text="project.description"></p>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <script>
        const API_BASE = 'https://bazz44-etdk3iuq2-lakhalhajar75-3482s-projects.vercel.app';
        const site_tag = 'architect';

        function dashboard() {
            return {
                projects: [],
                newProject: {
                    name: '',
                    description: '',
                    image_url: ''
                },
                async fetchProjects() {
                    try {
                        const response = await fetch(`${API_BASE}/api/projects?site_tag=${site_tag}`);
                        this.projects = await response.json();
                    } catch (error) {
                        console.error('Error fetching projects:', error);
                    }
                },
                async addProject() {
                    try {
                        const response = await fetch(`${API_BASE}/api/projects`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name: this.newProject.name,
                                description: this.newProject.description,
                                image_url: this.newProject.image_url,
                                site_tag: site_tag
                            })
                        });
                        
                        if (response.ok) {
                            this.newProject = { name: '', description: '', image_url: '' };
                            this.fetchProjects(); // Refresh UI immediately
                        }
                    } catch (error) {
                        console.error('Error adding project:', error);
                    }
                }
            }
        }
    </script>
</body>
</html>
