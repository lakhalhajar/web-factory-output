<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .glass {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(63, 63, 70, 0.5);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans antialiased">

    <div x-data="{
        tasks: [],
        loading: true,
        init() {
            const API_BASE = 'https://bazz44-api.vercel.app';
            const site_tag = 'architect';
            
            fetch(`${API_BASE}/api/projects`)
                .then(response => response.json())
                .then(data => {
                    this.tasks = data;
                    this.loading = false;
                })
                .catch(error => {
                    console.error('Error fetching tasks:', error);
                    this.loading = false;
                });
        }
    }" class="p-8 max-w-7xl mx-auto">

        <!-- Header -->
        <header class="mb-12">
            <h1 class="text-4xl font-bold tracking-tight text-white">Project Dashboard</h1>
            <p class="text-zinc-400 mt-2">Managing architectural workflows and visual assets.</p>
        </header>

        <!-- Loading State -->
        <div x-show="loading" class="flex justify-center items-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-zinc-500"></div>
        </div>

        <!-- Grid Display -->
        <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="task in tasks" :key="task.id">
                <div class="glass rounded-2xl p-6 transition-all hover:scale-[1.02] hover:border-zinc-500">
                    <div class="aspect-video w-full mb-4 overflow-hidden rounded-lg bg-zinc-800">
                        <img :src="task.image_url" :alt="task.name" class="w-full h-full object-cover">
                    </div>
                    <h2 class="text-xl font-semibold text-white mb-2" x-text="task.name"></h2>
                    <p class="text-zinc-400 text-sm leading-relaxed" x-text="task.description"></p>
                    <div class="mt-6 flex justify-end">
                        <button class="text-xs font-medium bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-full transition-colors">
                            View Details
                        </button>
                    </div>
                </div>
            </template>
        </div>

        <!-- Empty State -->
        <div x-show="!loading && tasks.length === 0" class="text-center py-20">
            <p class="text-zinc-500">No projects found at this time.</p>
        </div>

    </div>

</body>
</html>
