<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-8">

    <div x-data="{
        API_BASE: 'https://bazz44-api.vercel.app',
        site_tag: 'architect',
        projects: [],
        formData: { name: '', description: '', image_url: '' },
        loading: false,
        
        async fetchProjects() {
            this.loading = true;
            try {
                const response = await fetch(`${this.API_BASE}/api/projects?site_tag=${this.site_tag}`);
                this.projects = await response.json();
            } catch (error) {
                console.error('Error fetching projects:', error);
            } finally {
                this.loading = false;
            }
        },

        async submitProject() {
            try {
                const response = await fetch(`${this.API_BASE}/api/projects`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        ...this.formData, 
                        site_tag: this.site_tag 
                    })
                });
                if (response.ok) {
                    this.formData = { name: '', description: '', image_url: '' };
                    this.fetchProjects();
                }
            } catch (error) {
                console.error('Error submitting project:', error);
            }
        }
    }" x-init="fetchProjects()" class="max-w-6xl mx-auto">

        <!-- Header -->
        <header class="mb-12">
            <h1 class="text-4xl font-bold text-white mb-2">Architect Portfolio</h1>
            <p class="text-slate-400">Manage your architectural projects and designs.</p>
        </header>

        <!-- Form Section -->
        <section class="glass p-6 rounded-2xl mb-12">
            <h2 class="text-xl font-semibold mb-4 text-white">Add New Project</h2>
            <form @submit.prevent="submitProject" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" x-model="formData.name" placeholder="Project Name" class="bg-slate-900/50 border border-slate-700 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" required>
                <input type="url" x-model="formData.image_url" placeholder="Image URL" class="bg-slate-900/50 border border-slate-700 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" required>
                <textarea x-model="formData.description" placeholder="Project Description" class="md:col-span-2 bg-slate-900/50 border border-slate-700 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 h-24" required></textarea>
                <button type="submit" class="md:col-span-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition duration-200">Save Project</button>
            </form>
        </section>

        <!-- Grid Display -->
        <div x-show="loading" class="text-center py-10">Loading projects...</div>
        
        <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="project in projects" :key="project._id">
                <div class="glass rounded-2xl overflow-hidden hover:scale-105 transition duration-300">
                    <img :src="project.image_url" :alt="project.name" class="w-full h-48 object-cover">
                    <div class="p-5">
                        <h3 class="text-xl font-bold text-white mb-2" x-text="project.name"></h3>
                        <p class="text-slate-400 text-sm" x-text="project.description"></p>
                    </div>
                </div>
            </template>
        </div>

    </div>
</body>
</html>
