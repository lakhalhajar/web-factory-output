<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-8">

    <script>
        const API_BASE = 'https://bazz44-3jbyuk7j2-lakhalhajar75-3482s-projects.vercel.app/api';
        const site_tag = 'architect';

        function dashboardData() {
            return {
                projects: [],
                form: {
                    name: '',
                    description: '',
                    image_url: ''
                },
                async fetchProjects() {
                    try {
                        const response = await fetch(`${API_BASE}/api/projects?site_tag=${site_tag}`);
                        this.projects = await response.json();
                    } catch (error) {
                        console.error('Error fetching projects:', error);
                    }
                },
                async addProject() {
                    try {
                        const response = await fetch(`${API_BASE}/api/projects`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name: this.form.name,
                                description: this.form.description,
                                image_url: this.form.image_url,
                                site_tag: site_tag
                            })
                        });

                        if (response.ok) {
                            this.form = { name: '', description: '', image_url: '' };
                            this.fetchProjects();
                        }
                    } catch (error) {
                        console.error('Error adding project:', error);
                    }
                },
                init() {
                    this.fetchProjects();
                }
            }
        }
    </script>

    <div x-data="dashboardData()" class="max-w-6xl mx-auto">
        <header class="mb-12">
            <h1 class="text-4xl font-light tracking-tight text-white">Architectural Portfolio</h1>
            <p class="text-slate-400">Manage and showcase design projects.</p>
        </header>

        <!-- Form Section -->
        <section class="glass p-6 rounded-2xl mb-12">
            <h2 class="text-xl font-semibold mb-6">New Project</h2>
            <form @submit.prevent="addProject" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" x-model="form.name" placeholder="Project Name" class="bg-slate-900/50 border border-slate-700 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" x-model="form.description" placeholder="Description" class="bg-slate-900/50 border border-slate-700 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" x-model="form.image_url" placeholder="Image URL" class="bg-slate-900/50 border border-slate-700 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition">Add Project</button>
            </form>
        </section>

        <!-- Grid Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <template x-for="project in projects" :key="project.id || project.name">
                <div class="glass rounded-2xl overflow-hidden hover:scale-[1.02] transition-transform duration-300">
                    <img :src="project.image_url" :alt="project.name" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-white mb-2" x-text="project.name"></h3>
                        <p class="text-slate-400 text-sm" x-text="project.description"></p>
                    </div>
                </div>
            </template>
        </div>
    </div>

</body>
</html>
