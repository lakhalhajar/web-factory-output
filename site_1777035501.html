<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectNexus | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 glass hidden md:flex flex-col p-6">
            <div class="flex items-center gap-2 mb-10">
                <div class="p-2 bg-indigo-500 rounded-lg">
                    <i data-lucide="layout-dashboard" class="w-6 h-6 text-white"></i>
                </div>
                <span class="text-xl font-bold text-white">ProjectNexus</span>
            </div>
            <nav class="space-y-4">
                <a href="#" class="flex items-center gap-3 text-indigo-400 font-medium"><i data-lucide="grid" class="w-5 h-5"></i> Dashboard</a>
                <a href="#" class="flex items-center gap-3 hover:text-white transition"><i data-lucide="settings" class="w-5 h-5"></i> Settings</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-8">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-white">Project Overview</h1>
                    <p class="text-slate-400">Manage your digital assets and configurations.</p>
                </div>
                <button onclick="toggleModal()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg transition font-semibold">
                    <i data-lucide="plus" class="w-4 h-4"></i> Add New Entry
                </button>
            </header>

            <!-- Data Table -->
            <div class="glass rounded-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 border-b border-white/10">
                        <tr>
                            <th class="p-4">Name</th>
                            <th class="p-4">Description</th>
                            <th class="p-4">Image URL</th>
                        </tr>
                    </thead>
                    <tbody id="projectTableBody">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add Modal -->
    <div id="modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center">
        <div class="glass w-full max-w-md p-6 rounded-2xl">
            <h2 class="text-xl font-bold mb-4">Add New Project</h2>
            <form id="projectForm" class="space-y-4">
                <input type="text" id="name" placeholder="Name" class="w-full bg-slate-900 p-3 rounded-lg border border-slate-700 outline-none focus:border-indigo-500" required>
                <input type="text" id="description" placeholder="Description" class="w-full bg-slate-900 p-3 rounded-lg border border-slate-700 outline-none focus:border-indigo-500" required>
                <input type="url" id="image_url" placeholder="Image URL" class="w-full bg-slate-900 p-3 rounded-lg border border-slate-700 outline-none focus:border-indigo-500" required>
                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" onclick="toggleModal()" class="px-4 py-2 text-slate-400">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 rounded-lg font-semibold">Save Project</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Connection Protocol
        const API_BASE = 'https://bazz44-bwntcjqyz-lakhalhajar75-3482s-projects.vercel.app/api';
        const projectName = "ProjectNexus";
        const site_tag = projectName.toLowerCase().replace(/\s+/g, '_');

        // Initialize Icons
        lucide.createIcons();

        // UI Logic
        function toggleModal() {
            document.getElementById('modal').classList.toggle('hidden');
        }

        async function fetchProjects() {
            try {
                const response = await fetch(`${API_BASE}/api/projects?site_tag=${site_tag}`);
                const data = await response.json();
                const tbody = document.getElementById('projectTableBody');
                tbody.innerHTML = data.map(item => `
                    <tr class="border-b border-white/5 hover:bg-white/5">
                        <td class="p-4 font-medium">${item.name}</td>
                        <td class="p-4 text-slate-400">${item.description}</td>
                        <td class="p-4 text-xs font-mono text-indigo-300 truncate max-w-[200px]">${item.image_url}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Fetch error:', err);
            }
        }

        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const description = document.getElementById('description').value;
            const image_url = document.getElementById('image_url').value;

            try {
                await fetch(`${API_BASE}/api/projects`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description, image_url, site_tag })
                });
                toggleModal();
                fetchProjects();
            } catch (err) {
                console.error('Submission error:', err);
            }
        });

        // Initial Load
        fetchProjects();
    </script>
</body>
</html>
